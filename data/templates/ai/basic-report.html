<style>
  .doc {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .header h1 {
    margin: 0 0 6px 0;
    font-size: 24pt;
    letter-spacing: 0.4px;
  }

  .meta {
    display: flex;
    gap: 18px;
    color: #555;
    font-size: 10.5pt;
  }

  hr {
    border: none;
    border-top: 1px solid #e0e0e0;
  }

  .section h2 {
    margin: 0 0 6px 0;
    font-size: 14pt;
    color: var(--primary-color);
  }
</style>

<div class="doc">
  <div class="header">
    <h1 class="primary">{{input.title}}</h1>
    <div class="meta">
      <span>Generated: {{generatedAt}}</span>
      {{#if input.reference}}
      <span>Reference: {{input.reference}}</span>
      {{/if}}
    </div>
  </div>

  <hr />

  <div class="section">
    {{{nl2br outputText}}}
  </div>

  {{#if input.notes}}
  <div class="section">
    <h2>Notes</h2>
    <p>{{input.notes}}</p>
  </div>
  {{/if}}
</div>
